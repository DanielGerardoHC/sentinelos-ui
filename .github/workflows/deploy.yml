name: Deploy SentinelOS UI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:

    runs-on: self-hosted

    steps:
    - name: 1. Descargar último código
      uses: actions/checkout@v4

    - name: 2. Instalar dependencias
      run: pnpm install

    - name: 3. Compilar el artefacto Standalone
      run: pnpm build

    - name: 4. Ensamblar version de produccion
      run: |
        cp -r public .next/standalone/public
        mkdir -p .next/standalone/.next
        cp -r .next/static .next/standalone/.next/static
        
    - name: 🔄 5. Aplicar actualizacion y reiniciar SentinelOS
      run: |
        # Vaciamos la carpeta destino por completo
        sudo rm -rf /srv/sentinelos/ui/*
        sudo rm -rf /srv/sentinelos/ui/.* 2>/dev/null || true
        
        # Copiamos usando "/." al final para forzar copiar los ocultos (.next)
        sudo cp -a .next/standalone/. /srv/sentinelos/ui/
        
        # Reiniciamos el demonio
        sudo systemctl restart sentinel-ui